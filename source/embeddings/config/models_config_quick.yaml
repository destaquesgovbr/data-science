# Configuração rápida para teste - apenas 3 modelos representativos

models:
  # Claude Haiku - baseline (usado para anotar)
  - model_id: "anthropic.claude-3-haiku-20240307-v1:0"
    name: "Claude 3 Haiku"
    provider: "anthropic"
    pricing:
      input_per_mtok: 0.25
      output_per_mtok: 1.25
    context_limit: 200000
    tier: "S"

  # Amazon Nova Pro - melhor custo/benefício
  - model_id: "amazon.nova-pro-v1:0"
    name: "Amazon Nova Pro"
    provider: "amazon"
    pricing:
      input_per_mtok: 0.80
      output_per_mtok: 3.20
    context_limit: 300000
    tier: "B"

  # Mistral Large 3 - mais recente
  - model_id: "mistral.mistral-large-3-675b-instruct"
    name: "Mistral Large 3"
    provider: "mistral"
    pricing:
      input_per_mtok: 2.0
      output_per_mtok: 6.0
    context_limit: 128000
    tier: "A"

# Configurações de avaliação
evaluation:
  test_file: "data/classification/news_classification_test_annotated.csv"
  prompt_strategy: "json"
  region: "us-east-1"
  batch_size: 10
