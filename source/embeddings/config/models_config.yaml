# Categorias do dataset (CORRETO - deve bater com o CSV!)
categories:
  - "Agricultura"
  - "Assistência Social"
  - "Ciência e Tecnologia"
  - "Cultura"
  - "Economia"
  - "Educação"
  - "Infraestrutura"
  - "Meio Ambiente"
  - "Saúde"
  - "Segurança Pública"

# Configurações de avaliação
evaluation:
  test_file: "data/classification/news_classification_test.csv"
  prompt_strategy: "zero-shot"  # Começar com zero-shot
  region: "us-east-1"
  batch_size: 10  # Classificar 10 por vez antes de dar feedback visual
