# Configuração de modelos LLM para Issue #3
# AWS Bedrock - Apenas modelos com acesso ON_DEMAND habilitado

models:
  # Tier S - Claude (versões antigas com ON_DEMAND)
  - model_id: "anthropic.claude-3-sonnet-20240229-v1:0"
    name: "Claude 3 Sonnet"
    provider: "anthropic"
    pricing:
      input_per_mtok: 3.0
      output_per_mtok: 15.0
    context_limit: 200000
    tier: "S"

  - model_id: "anthropic.claude-3-haiku-20240307-v1:0"
    name: "Claude 3 Haiku"
    provider: "anthropic"
    pricing:
      input_per_mtok: 0.25
